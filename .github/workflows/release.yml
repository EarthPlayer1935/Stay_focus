name: Release Extension

on:
  push:
    tags:
      - 'v*'

jobs:
  build-extension:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install root dependencies
        run: npm install

      - name: Build extension zip
        run: npm run build

      - name: Upload extension zip
        uses: softprops/action-gh-release@v1
        with:
          files: release/*.zip
          generate_release_notes: true

  build-desktop:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: main-repo # Optional but often helps with path lengths

      - name: Enable symlinks
        run: |
          git config --global core.symlinks true
          git config --global core.autocrlf false
        shell: bash

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install desktop dependencies
        working-directory: ./main-repo/stay_focus_desktop
        run: npm install

      - name: Build desktop installer
        working-directory: ./main-repo/stay_focus_desktop
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Node version:" && node -v
          echo "Building..."
          npm run dist
        shell: bash

      - name: Upload desktop installer
        uses: softprops/action-gh-release@v1
        with:
          files: |
            main-repo/stay_focus_desktop/build/*.exe
            main-repo/stay_focus_desktop/build/*.7z
