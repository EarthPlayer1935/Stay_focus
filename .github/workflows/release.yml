name: Release Extension

on:
  push:
    tags:
      - 'v*'

jobs:
  build-extension:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install root dependencies
        run: npm install

      - name: Build extension zip
        run: npm run build

      - name: Upload extension zip
        uses: softprops/action-gh-release@v1
        with:
          files: release/*.zip
          generate_release_notes: true

  build-desktop:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install desktop dependencies
        working-directory: ./stay_focus_desktop
        run: npm install

      - name: Build desktop installer
        working-directory: ./stay_focus_desktop
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist

      - name: Upload desktop installer
        uses: softprops/action-gh-release@v1
        with:
          files: |
            stay_focus_desktop/build/*.exe
            stay_focus_desktop/build/*.7z
