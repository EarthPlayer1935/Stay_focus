<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stay Focus</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Stay Focus</h1>
      <div class="header-right">
        <select id="langSelect" title="Language">
          <option value="en">English</option>
          <option value="zh_CN">中文</option>
          <option value="ja">日本語</option>
          <option value="fr">Français</option>
          <option value="de">Deutsch</option>
          <option value="es">Español</option>
          <option value="ru">Русский</option>
          <option value="ko">한국어</option>
          <option value="th">ภาษาไทย</option>
          <option value="ar">العربية</option>
          <option value="pt">Português</option>
          <option value="hi">हिन्दी</option>
        </select>
        <label class="switch">
          <input type="checkbox" id="toggleFocus" />
          <span class="slider round"></span>
        </label>
      </div>
    </div>

    <div class="controls">
      <div class="control-group switch-group">
        <label for="toggleFullRow">Full Row Mode</label>
        <label class="switch small-switch">
          <input type="checkbox" id="toggleFullRow" />
          <span class="slider round"></span>
        </label>
      </div>

      <div class="control-group switch-group">
        <label for="toggleHighlightMode">Color Highlight Mode</label>
        <label class="switch small-switch">
          <input type="checkbox" id="toggleHighlightMode" />
          <span class="slider round"></span>
        </label>
      </div>

      <div class="shape-presets">
        <button id="btnSquare" class="preset-btn" title="Square">⬛</button>
        <button id="btnRounded" class="preset-btn" title="Rounded Box">🔲</button>
        <button id="btnCircle" class="preset-btn" title="Circle">⏺</button>
      </div>

      <div class="control-group switch-group" style="border-bottom: none; padding-bottom: 2px;">
        <label for="toggleLinkSize">Link Dimensions (1:1)</label>
        <label class="switch small-switch">
          <input type="checkbox" id="toggleLinkSize" />
          <span class="slider round"></span>
        </label>
      </div>
      
      <div class="control-group switch-group">
        <label for="toggleAutoHide">Auto-hide on Mouse Leave</label>
        <label class="switch small-switch">
          <input type="checkbox" id="toggleAutoHide" />
          <span class="slider round"></span>
        </label>
      </div>

      <div class="control-group switch-group">
        <label for="toggleKeyboardControl">Keyboard Control</label>
        <label class="switch small-switch">
          <input type="checkbox" id="toggleKeyboardControl" />
          <span class="slider round"></span>
        </label>
      </div>

      <div class="control-group">
        <label for="heightRange">Spotlight Height</label>
        <input type="range" id="heightRange" min="20" max="300" value="50" />
      </div>

      <div class="control-group">
        <label for="widthRange">Spotlight Width</label>
        <input type="range" id="widthRange" min="50" max="800" value="200" />
      </div>

      <div class="control-group">
        <label for="borderRadiusRange">Corner Radius</label>
        <input type="range" id="borderRadiusRange" min="0" max="150" value="12" />
      </div>

      <div class="control-group">
        <label for="opacityRange">Opacity</label>
        <input type="range" id="opacityRange" min="10" max="95" value="75" />
      </div>
      
      <div class="control-group">
        <label for="colorPicker">Color</label>
        <input type="color" id="colorPicker" value="#000000" />
      </div>
    </div>
    <div class="footer">
      Use Mouse or Up/Down arrows to move.
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
