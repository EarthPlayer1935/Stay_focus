name: Release Extension

on:
  push:
    tags:
      - 'v*'

jobs:
  build-extension:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install root dependencies
        run: npm install

      - name: Build extension zip
        run: npm run build

      - name: Upload extension zip
        uses: softprops/action-gh-release@v1
        with:
          files: release/*.zip
          generate_release_notes: true

  build-desktop:
    runs-on: windows-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install desktop dependencies
        working-directory: stay_focus_desktop
        run: npm install
        shell: pwsh

      - name: Build desktop installer
        working-directory: stay_focus_desktop
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_BUILDER_HTTP_TIMEOUT: 120000
          DEBUG: electron-builder
        run: |
          echo "Node: $(node -v)"
          echo "npm: $(npm -v)"
          echo "Starting electron-builder..."
          
          npx electron-builder --win > build.log 2>&1 || {
            echo "Build failed with exit code $?. Creating issue with log..."
            tail -n 100 build.log > issue_tail.log
            
            echo -e "CI Desktop Build Failed. Action Run URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\n\n\`\`\`text" > issue.md
            cat issue_tail.log >> issue.md
            echo -e "\n\`\`\`" >> issue.md
            
            gh issue create --title "CI Desktop Build Failure (Auto-Report)" --body-file issue.md
            exit 1
          }
        shell: bash

      - name: Upload desktop installer
        uses: softprops/action-gh-release@v1
        with:
          files: |
            stay_focus_desktop/dist/*.exe
            stay_focus_desktop/dist/*.7z
