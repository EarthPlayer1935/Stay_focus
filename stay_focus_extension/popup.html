<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stay Focus</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1 id="pluginName">Stay Focus</h1>
      <label class="switch">
        <input type="checkbox" id="toggleFocus" />
        <span class="slider round"></span>
      </label>
    </div>

    <div class="controls">
      <!-- 1. 形状选择 -->
      <div class="shape-presets" style="margin-top: 0; margin-bottom: 4px;">
        <button id="btnSquare" class="preset-btn" title="Square">⬛</button>
        <button id="btnRounded" class="preset-btn" title="Rounded Box">🔲</button>
        <button id="btnCircle" class="preset-btn" title="Circle">⏺</button>
      </div>

      <!-- 2. 联动宽高 -->
      <div class="control-group switch-group" style="padding-top: 2px; padding-bottom: 6px;">
        <label for="toggleLinkSize">Link Dimensions (1:1)</label>
        <label class="switch small-switch">
          <input type="checkbox" id="toggleLinkSize" />
          <span class="slider round"></span>
        </label>
      </div>

      <!-- 3. 宽高圆角参数自调滑块 -->
      <div class="control-group">
        <label for="heightRange">Spotlight Height</label>
        <input type="range" id="heightRange" min="20" max="800" value="50" />
      </div>
      <div class="control-group">
        <label for="widthRange">Spotlight Width</label>
        <input type="range" id="widthRange" min="50" max="1000" value="200" />
      </div>
      <div class="control-group">
        <label for="borderRadiusRange">Corner Radius</label>
        <input type="range" id="borderRadiusRange" min="0" max="150" value="12" />
      </div>
      <div class="control-group" style="margin-bottom: 6px;">
        <label for="opacityRange">Opacity</label>
        <input type="range" id="opacityRange" min="10" max="95" value="75" />
      </div>

      <!-- 4. 截图规避，整行模式，色彩高亮（放一行） -->
      <div class="multi-switch-row">
        <div class="mini-switch" title="Screenshot Avoidance">
          <label for="toggleAntiScreenshot">Screenshot Avoidance</label>
          <label class="switch small-switch">
            <input type="checkbox" id="toggleAntiScreenshot" checked />
            <span class="slider round"></span>
          </label>
        </div>
        <div class="mini-switch" title="Full Row Mode">
          <label for="toggleFullRow">Full Row Mode</label>
          <label class="switch small-switch">
            <input type="checkbox" id="toggleFullRow" />
            <span class="slider round"></span>
          </label>
        </div>
        <div class="mini-switch" title="Color Highlight Mode">
          <label for="toggleHighlightMode">Color Highlight Mode</label>
          <label class="switch small-switch">
            <input type="checkbox" id="toggleHighlightMode" />
            <span class="slider round"></span>
          </label>
        </div>
      </div>

      <!-- Keyboard Control -->
      <div class="control-group switch-group" title="Shortcut: Shift+Alt+Arrow">
        <label for="toggleKeyboardControl">Keyboard Control (Shift+Alt+Arrow)</label>
        <label class="switch small-switch">
          <input type="checkbox" id="toggleKeyboardControl" />
          <span class="slider round"></span>
        </label>
      </div>

      <!-- 5. 指定进程开关 -->
      <div class="control-group switch-group" style="border-bottom: none; padding-bottom: 4px;">
        <label for="toggleAutoHide">Auto-hide on Mouse Leave</label>
        <label class="switch small-switch">
          <input type="checkbox" id="toggleAutoHide" />
          <span class="slider round"></span>
        </label>
      </div>

      <!-- 6. 标签选择 -->
      <div class="control-group process-group" id="tabGroup">
        <div class="process-hint" id="tabHint">No target tab — global mode</div>
        <div class="process-tags" id="tabTags"></div>
        <div class="process-input-row" style="margin-top:0;">
          <input type="text" id="tabInput" placeholder="e.g. github.com" list="tabList" />
          <datalist id="tabList"></datalist>
          <button id="btnAddTab" class="add-btn">+</button>
        </div>
      </div>

      <div class="control-group" style="margin-top: 8px;">
        <label for="colorPicker">Color</label>
        <input type="color" id="colorPicker" value="#000000" />
      </div>
    </div>
    <div class="footer">
      <div class="footer-icons">
        <div class="icon-actions">
          <button id="btnLanguage" class="icon-btn" title="Language">🌐</button>
          <button id="btnNightMode" class="icon-btn" title="Night Mode">🌙</button>
          <button id="btnKofi" class="icon-btn" title="Support on Ko-fi">☕</button>
          <button id="btnGithub" class="icon-btn" title="Star on GitHub">⭐</button>
        </div>
        
        <div id="langMenu" class="lang-menu hidden">
          <div class="lang-option" data-value="en">English</div>
          <div class="lang-option" data-value="zh_CN">中文</div>
          <div class="lang-option" data-value="ja">日本語</div>
          <div class="lang-option" data-value="fr">Français</div>
          <div class="lang-option" data-value="de">Deutsch</div>
          <div class="lang-option" data-value="es">Español</div>
          <div class="lang-option" data-value="ru">Русский</div>
          <div class="lang-option" data-value="ko">한국어</div>
          <div class="lang-option" data-value="th">ภาษาไทย</div>
          <div class="lang-option" data-value="ar">العربية</div>
          <div class="lang-option" data-value="pt">Português</div>
          <div class="lang-option" data-value="hi">हिन्दी</div>
        </div>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
